{% extends "client/base.html" %}
{% block content %}
<div class="steps">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
</div>

<a href="/book/{{ service.name }}/slots?date_str={{ date_str }}" class="back-link">← Назад</a>

<div class="client-card">
    <h2 class="section-title">Ваши данные</h2>
    <p class="section-subtitle">{{ service.name }} · {{ date_str }} · {{ time_str }}</p>

    <form method="post" action="/book/confirm" class="client-form" id="bookForm">
        <input type="hidden" name="service" value="{{ service.name }}">
        <input type="hidden" name="date_str" value="{{ date_str }}">
        <input type="hidden" name="time_str" value="{{ time_str }}">

        <input type="text" name="client_name" class="client-input" placeholder="Ваше имя" required>
        <input type="tel" name="client_phone" id="phoneInput" class="client-input" placeholder="+7 (___) ___-__-__" required maxlength="18">

        <button type="submit" class="client-btn">Записаться</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('phoneInput');

    input.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');

        if (val.length === 0) {
            e.target.value = '';
            return;
        }

        if (val[0] === '8') val = '7' + val.slice(1);
        if (val[0] !== '7') val = '7' + val;

        let formatted = '+7';
        if (val.length > 1) formatted += ' (' + val.slice(1, 4);
        if (val.length >= 4) formatted += ') ';
        if (val.length > 4) formatted += val.slice(4, 7);
        if (val.length > 7) formatted += '-' + val.slice(7, 9);
        if (val.length > 9) formatted += '-' + val.slice(9, 11);

        e.target.value = formatted;
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const form = document.getElementById('bookForm');
            const name = form.querySelector('[name="client_name"]').value.trim();
            const phone = input.value.replace(/\D/g, '');
            if (name && phone.length >= 11) {
                form.submit();
            }
        }
    });

    input.focus();
});
</script>
{% endblock %}
